# Deploy to Hostinger over FTP.
#
# To activate: rename this file to `deploy-hostinger.yml` (drop `.disabled`).
#
# Repository secrets required:
#   FTP_SERVER     e.g. ftp.embrace-ai.org
#   FTP_USERNAME
#   FTP_PASSWORD
#
# No FTP_DIR needed: Hostinger FTP accounts log in directly inside public_html,
# which the action treats as the web root by default.
#
# The daily cron is what makes new Meetup events appear without a commit:
# the build re-fetches the iCal feed each run.

name: Deploy to Hostinger

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily, picks up new Meetup events
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

permissions:
  contents: write # so the auto-archived past-events.json can be committed back

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      # An event that just moved into the past is archived by the build; persist it.
      - name: Commit archived events
        run: |
          if ! git diff --quiet src/data/past-events.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/past-events.json
            git commit -m "chore: archive past meetup events [skip ci]"
            git push
          fi

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # No server-dir: this FTP account logs in directly inside public_html,
          # so the action default (./) is already the web root. Setting a
          # public_html/ dir would nest into public_html/public_html/.
          local-dir: ./dist/
          dangerous-clean-slate: false
